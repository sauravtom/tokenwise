name: Release yoyo binary

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build and attach binary
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/yoyo dist/yoyo-x86_64-unknown-linux-gnu
          tar -C dist -czf yoyo-x86_64-unknown-linux-gnu.tar.gz yoyo-x86_64-unknown-linux-gnu

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: yoyo-x86_64-unknown-linux-gnu.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
